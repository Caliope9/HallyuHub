<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HallyuHub</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-shell" aria-label="Aplicacion HallyuHub">
      <section class="app-screen">
        <header class="topbar" id="topbar">
          <div class="topbar-brand">
            <span class="app-logo" aria-hidden="true"><span class="hallyu-mark"></span></span>
            <div class="topbar-copy">
              <p class="eyebrow">HallyuHub</p>
              <h1 id="screen-title">Tu universo K-pop latino</h1>
            </div>
          </div>
          <button class="icon-button" data-go-view="notifications" aria-label="Notificaciones">
            <span class="premium-inbox-icon"></span>
            <span class="notification-dot"></span>
          </button>
        </header>

        <section id="view" class="view" aria-live="polite"></section>

        <nav class="bottom-nav" aria-label="Navegacion principal">
          <button class="nav-item active" data-view="home" aria-label="Inicio">
            <span class="nav-icon home-icon"></span>
            <span>Inicio</span>
          </button>
          <button class="nav-item" data-view="search" aria-label="Buscar">
            <span class="nav-icon search-icon"></span>
            <span>Buscar</span>
          </button>
          <button class="nav-item" data-view="trends" aria-label="Drops">
            <span class="nav-icon play-icon"></span>
            <span>Drops</span>
          </button>
          <button class="nav-item publish-nav" data-view="publish" aria-label="Publicar">
            <span class="nav-icon plus-icon"></span>
            <span>Publicar</span>
          </button>
          <button class="nav-item" data-view="profile" aria-label="Perfil">
            <span class="nav-icon user-icon"></span>
            <span>Perfil</span>
          </button>
        </nav>
      </section>
    </main>

    <script src="./supabase-config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
